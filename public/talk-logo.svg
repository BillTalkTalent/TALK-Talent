<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">TALK logo</title>
  <desc id="desc">White TALK wordmark with overlapping speech bubble icon and purple accent on a transparent background.</desc>
  <defs>
    <linearGradient id="purpleAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B5CFF"/>
      <stop offset="100%" stop-color="#6F2CFF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Icon group -->
  <g transform="translate(110 95)" filter="url(#softShadow)">
    <!-- Back chat bubble outline -->
    <path d="M218 62
             H342
             C402 62 444 105 444 165
             V221
             C444 281 402 324 342 324
             H272
             L335 380
             L256 324
             H218
             C158 324 116 281 116 221
             V165
             C116 105 158 62 218 62Z"
          fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linejoin="round"/>

    <!-- Purple overlap/accent -->
    <path d="M248 178
             H352
             C375 178 392 195 392 218
             V240
             C392 267 371 288 344 288
             H250
             C222 288 202 267 202 240
             V224
             C202 197 221 178 248 178Z"
          fill="url(#purpleAccent)"/>

    <!-- Front chat bubble -->
    <path d="M50 0
             H268
             C330 0 374 44 374 106
             V175
             C374 237 330 281 268 281
             H206
             L206 333
             C206 346 191 353 181 344
             L113 281
             H50
             C20 281 0 261 0 231
             V50
             C0 20 20 0 50 0Z"
          fill="#FFFFFF"/>

    <!-- Negative lines and T shape -->
    <rect x="86" y="78" width="208" height="38" rx="19" fill="transparent"/>
    <rect x="126" y="78" width="208" height="38" rx="19" fill="#000000" opacity="0.92"/>
    <path d="M126 154
             H270
             C282 154 292 164 292 176
             C292 188 282 198 270 198
             H225
             V281
             C225 293 215 303 203 303
             C191 303 181 293 181 281
             V198
             H126
             C114 198 104 188 104 176
             C104 164 114 154 126 154Z"
          fill="#000000" opacity="0.92"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(610 128)">
    <text x="0" y="235"
          font-family="Montserrat, Gotham, Avenir Next, Arial Black, Arial, sans-serif"
          font-size="235"
          font-weight="900"
          letter-spacing="8"
          fill="#FFFFFF">T</text>

    <!-- Custom A -->
    <path d="M240 235 L338 0 H395 L493 235 H432 L414 190 H318 L300 235 Z
             M337 140 H395 L366 65 Z"
          fill="#FFFFFF"/>
    <circle cx="366" cy="198" r="28" fill="url(#purpleAccent)"/>

    <text x="530" y="235"
          font-family="Montserrat, Gotham, Avenir Next, Arial Black, Arial, sans-serif"
          font-size="235"
          font-weight="900"
          letter-spacing="8"
          fill="#FFFFFF">LK</text>
  </g>
</svg>
